{% extends "estudiantes/base.html" %}

{% block titulo %}Editar Producto{% endblock %}

{% block content %}
<div class="card">
    <h1>Editar Producto</h1>

    {% if error %}
        <p class="error">⚠️ {{ error }}</p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <label for="nombre">Nombre del producto:</label>
        <input type="text" id="nombre" name="nombre" value="{{ producto.nombre }}" required>

        <label for="precio">Precio:</label>
        <input type="number" id="precio" name="precio" step="0.01" value="{{ producto.precio }}" min="0" required>

        <button type="submit" class="btn btn-warning">Actualizar Producto</button>
    </form>

    <br>
    <a href="{% url 'lista_productos' %}" class="btn btn-primary">← Cancelar y volver</a>
</div>
{% endblock %}
