{% extends "estudiantes/base.html" %}

{% block titulo %}Registrar Producto{% endblock %}

{% block content %}
<div class="card">
    <h1>Registrar Producto</h1>

    {% if error %}
        <p class="error">⚠️ {{ error }}</p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <label for="nombre">Nombre del producto:</label>
        <input type="text" id="nombre" name="nombre" placeholder="Ej: Cuaderno" required>

        <label for="precio">Precio:</label>
        <input type="number" id="precio" name="precio" step="0.01" placeholder="Ej: 9.99" min="0" required>

        <button type="submit" class="btn btn-success">Guardar Producto</button>
    </form>

    <br>
    <a href="{% url 'lista_productos' %}" class="btn btn-primary">← Volver a la lista</a>
</div>
{% endblock %}
