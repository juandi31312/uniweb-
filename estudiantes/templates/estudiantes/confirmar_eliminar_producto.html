{% extends "estudiantes/base.html" %}

{% block titulo %}Eliminar Producto{% endblock %}

{% block content %}
<div class="card" style="text-align:center;">
    <h1>¿Eliminar producto?</h1>
    <p>¿Estás seguro de que quieres eliminar <strong>{{ producto.nombre }}</strong>?</p>
    <p>Esta acción no se puede deshacer.</p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Sí, eliminar</button>
    </form>

    <br>
    <a href="{% url 'lista_productos' %}" class="btn btn-primary">Cancelar</a>
</div>
{% endblock %}
