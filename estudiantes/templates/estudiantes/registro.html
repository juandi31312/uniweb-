{% extends "estudiantes/base.html" %}

{% block titulo %}Registrar Estudiante{% endblock %}

{% block content %}
<div class="card">
    <h1>Registrar Estudiante</h1>

    {% if error %}
        <p class="error">⚠️ {{ error }}</p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" placeholder="Ej: Juan Pérez" required>

        <label for="edad">Edad:</label>
        <input type="number" id="edad" name="edad" placeholder="Ej: 20" min="1" required>

        <button type="submit" class="btn btn-success">Guardar</button>
    </form>

    <br>
    <a href="{% url 'lista_estudiantes' %}" class="btn btn-primary">← Volver a la lista</a>
</div>
{% endblock %}
