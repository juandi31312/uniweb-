<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}UniWeb{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        nav {
            background-color: #2c3e50;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
            font-weight: bold;
        }
        nav a:hover {
            text-decoration: underline;
        }
        h1 {
            color: #2c3e50;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .btn {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
            border: none;
            font-size: 14px;
        }
        .btn-primary { background-color: #2980b9; color: white; }
        .btn-success { background-color: #27ae60; color: white; }
        .btn-danger  { background-color: #e74c3c; color: white; }
        .btn-warning { background-color: #f39c12; color: white; }
        .btn:hover { opacity: 0.85; }
        .error { color: red; font-size: 0.9em; margin-top: 8px; }
        label { font-weight: bold; display: block; margin-bottom: 4px; }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            margin-bottom: 12px;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #2c3e50; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'home' %}">🏠 Inicio</a>
        <a href="{% url 'lista_estudiantes' %}">👨‍🎓 Estudiantes</a>
        <a href="{% url 'lista_productos' %}">📦 Productos</a>
    </nav>

    {% block content %}{% endblock %}
</body>
</html>
